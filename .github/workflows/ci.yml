name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v3
        with:
          msystem: MINGW64
          update: true
          install: mingw-w64-x86_64-gcc

      - name: Run tests
        shell: bash
        run: |
          make test

      - name: Upload test output artifact
        uses: actions/upload-artifact@v4
        with:
          name: ci-test-output
          path: outputs/ci_example1.ppm
